<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Stylized book/ledger with upward arrow - representing Lekha (accounting/writing) + AI -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#39d2c0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Open book / ledger base -->
  <path d="M40 140 L100 170 L160 140 L160 60 L100 90 L40 60 Z" stroke="url(#grad1)" stroke-width="6" fill="none" stroke-linejoin="round"/>
  <!-- Center spine -->
  <line x1="100" y1="90" x2="100" y2="170" stroke="url(#grad1)" stroke-width="4"/>
  <!-- Left page lines -->
  <line x1="55" y1="85" x2="90" y2="100" stroke="url(#grad1)" stroke-width="3" opacity="0.5"/>
  <line x1="55" y1="100" x2="90" y2="115" stroke="url(#grad1)" stroke-width="3" opacity="0.5"/>
  <line x1="55" y1="115" x2="90" y2="130" stroke="url(#grad1)" stroke-width="3" opacity="0.5"/>
  <!-- Right page - checkmarks (reconciled) -->
  <polyline points="115,100 122,107 135,90" stroke="#3fb950" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="115,118 122,125 135,108" stroke="#3fb950" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Upward arrow (AI/growth) -->
  <path d="M100 65 L100 25" stroke="url(#grad1)" stroke-width="5" stroke-linecap="round"/>
  <polyline points="82,43 100,25 118,43" stroke="url(#grad1)" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- AI sparkle dots -->
  <circle cx="75" cy="35" r="3" fill="#58a6ff" opacity="0.7"/>
  <circle cx="125" cy="35" r="3" fill="#39d2c0" opacity="0.7"/>
  <circle cx="100" cy="15" r="2.5" fill="#bc8cff" opacity="0.7"/>
</svg>